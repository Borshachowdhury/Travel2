<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Modern Auth</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1, #89f7fe);
    background-size: 300% 300%;
    animation: gradientMove 8s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}
.card{
    width:330px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
}
.top{
    height:180px;
    position:relative;
    background:#fff;
    overflow:hidden;
}
.top::before{
    content:"";
    position:absolute;
    top:-90px;
    right:-90px;
    width:280px;
    height:280px;
    background:#4e5aa7;
    border-radius:50%;
}
.top::after{
    content:"";
    position:absolute;
    top:-40px;
    right:40px;
    width:120px;
    height:120px;
    background:#5c6bc0;
    border-radius:50%;
}
.heart{
    position:absolute;
    top:70px;
    left:30px;
    font-size:40px;
    color:#4e5aa7;
}
.welcome{
    padding:0 30px;
}
.welcome h2{
    margin:0;
    color:#4e5aa7;
}
.welcome p{
    margin-top:5px;
    font-size:14px;
    color:gray;
}

/* ===== Only Login Form ===== */
.form-box{
    background:#4e5aa7;
    margin:20px;
    padding:20px;
    border-radius:15px;
    color:#fff;
     /* SUPER SLOW SMOOTH ANIMATION */
    opacity:0;
    transform: translate(-150px, -150px) scale(0.4);
    animation: slowCornerDrop 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
@keyframes slowCornerDrop {
    0% {
        opacity: 0;
        transform: translate(-150px, -150px) scale(0.4);
    }
    40% {
        opacity: 0.4;
        transform: translate(-60px, -60px) scale(0.8);
    }
    70% {
        opacity: 0.8;
        transform: translate(-10px, -10px) scale(1.03);
    }
    100% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
    }
}

.form-box label{
    font-size:13px;
}
.input-group{
    margin:10px 0 15px;
}
.input-group input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    outline:none;
}
.options{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    margin-bottom:15px;
}
.options a{
    color:#fff;
    text-decoration:none;
}
.options a:hover{
    text-decoration:underline;
}
.btn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:20px;
    background:linear-gradient(to right,#8895e0,#4e5aa7);
    color:white;
    font-size:15px;
    cursor:pointer;
}
.bottom{
    text-align:center;
    margin:15px 0 20px;
    font-size:13px;
}
.bottom a{
    color:#4e5aa7;
    text-decoration:none;
    font-weight:bold;
}
.social-login{
    text-align:center;
    margin-top:10px;
}
.social-login p{
    font-size:13px;
    margin-bottom:8px;
    color:#fff;
}
.social-icons a{
    display:inline-flex;
    width:40px;
    height:40px;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    margin:0 6px;
    color:#fff;
    font-size:18px;
    text-decoration:none;
}
.fb{ background:#1877f2; }
.gm{ background:#db4437; }
.tw{ background:#1da1f2; }
.gh{ background:#333; }

</style>
</head>
<body>

<div class="card">

    <div class="top">
        <div class="heart">❤</div>
    </div>

    <div class="welcome">
        <h2>Welcome!</h2>
        <p>Please login to continue</p>
    </div>

    <!-- ===== Login Only Form ===== -->
    <div class="form-box">

        <label>Email or Username</label>
        <div class="input-group">
            <input type="text" placeholder="Enter Email or Username">
        </div>

        <label>Password</label>
        <div class="input-group">
            <input type="password" placeholder="********">
        </div>

        <div class="options">
            <div><input type="checkbox"> Remember me</div>
            <a href="forgot.html">Forgot Password?</a>
        </div>

        <button class="btn">Sign In</button>

        <div class="social-login">
            <p>Or login with</p>
            <div class="social-icons">
                <a class="fb" href="#"><i class="fab fa-facebook-f"></i></a>
                <a class="gm" href="#"><i class="fab fa-google"></i></a>
                <a class="tw" href="#"><i class="fab fa-twitter"></i></a>
                <a class="gh" href="#"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </div>

    <div class="bottom">
        Don’t have an account?
        <a href="register.html">Register Now</a>
    </div>

</div>

</body>
</html>
